name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  web-build:
    # Compiles the SPA so downstream cargo jobs can embed web/dist via
    # rust-embed. web/dist is gitignored, so without this every cargo
    # job would fail at macro-expansion time.
    name: build SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - working-directory: web
        run: pnpm install --frozen-lockfile
      - working-directory: web
        run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -Dwarnings

  test:
    name: test (workspace)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  # Portability gate: run the dochub-db repo layer against a REAL Postgres, not
  # just sqlite. Proves migrations apply and the ?→$n placeholder rewrite +
  # integer/timestamp/base64 handling work on Postgres. Gated in-test by
  # DOCHUB_TEST_PG_URL, so it is a no-op locally.
  test-postgres:
    name: test (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: dochub
          POSTGRES_PASSWORD: dochub
          POSTGRES_DB: dochub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dochub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Postgres portability smoke test
        env:
          DOCHUB_TEST_PG_URL: postgres://dochub:dochub@localhost:5432/dochub
        run: cargo test -p dochub-db --test postgres -- --nocapture

  spikes:
    name: test (spikes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: spike 01 — storage
        working-directory: spikes/01-storage
        run: cargo test
      - name: spike 02 — wopi-host
        working-directory: spikes/02-wopi-host
        run: cargo test
      - name: spike 04 — two-origin
        working-directory: spikes/04-two-origin
        run: cargo test

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      # Mirror deny.toml's ignore set. RUSTSEC-2023-0071 (RSA Marvin) is
      # reachable only via sqlx-mysql, which we do not enable. The 2026-06-29
      # advisories are transitive and pending a dependency bump in the code
      # revamp (anyhow: RUSTSEC-2026-0190; quick-xml: -0194/-0195, fix >=0.41).
      # RUSTSEC-2026-0192 (ttf-parser unmaintained, not a vuln) is transitive
      # via pdf-extract — see deny.toml for the full justification.
      - run: cargo audit --deny warnings --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0190 --ignore RUSTSEC-2026-0192 --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: casual-drive:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    # Playwright smoke suite against the demo-mode SPA (no Drive backend
    # involved — demo handles auth + state in localStorage). Spec lives
    # in web/tests/e2e/.
    name: playwright (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Install chromium
        working-directory: web
        run: pnpm exec playwright install chromium --with-deps
      - name: Build demo SPA
        working-directory: web
        env:
          VITE_DEMO_MODE: "1"
        run: pnpm build
      - working-directory: web
        run: pnpm test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/test-results
            web/playwright-report
          retention-days: 7
