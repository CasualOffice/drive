name: Release

# Publishes the Doc-Hub container image to Docker Hub on a version tag.
# Push a tag like `v0.0.1` (matching the workspace version in Cargo.toml) to
# trigger a multi-arch build + push and a Docker Hub overview refresh.
#
# Secrets live in the `release` GitHub environment:
#   DOCKERHUB_USERNAME  — Docker Hub namespace (the image is <username>/dochub)
#   DOCKERHUB_TOKEN     — Docker Hub access token with write scope

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the GitHub Release for the tag

jobs:
  image:
    name: build + push image
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      # Guard: the git tag must match the Cargo workspace version, so a
      # mistagged push can never publish an image whose binary reports a
      # different version.
      - name: Verify tag matches Cargo version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_ver="$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)"
          echo "git tag: $tag — Cargo version: $cargo_ver"
          if [ "$tag" != "$cargo_ver" ]; then
            echo "::error::tag v$tag does not match Cargo version $cargo_ver — bump one to match"
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/dochub
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=Doc-Hub
            org.opencontainers.image.description=Encrypted, tamper-evident self-hosted document hub
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.url=https://casualoffice.org
            org.opencontainers.image.source=https://github.com/CasualOffice/drive

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Keep the Docker Hub tag listing clean (no unknown/unknown
          # attestation entries). SBOM + provenance are a documented
          # fast-follow once the pipeline is proven.
          provenance: false

      - name: Update Docker Hub overview
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/dochub
          short-description: "Encrypted, tamper-evident self-hosted document hub — a single Rust binary."
          readme-filepath: ./.docker/README.md

      # Publish a GitHub Release for the tag, with notes lifted from the
      # matching CHANGELOG section. Runs after the image push, so a hiccup here
      # never blocks the published image.
# Software bill of materials for the published image — attached to the
      # GitHub Release (not the registry) so it's discoverable without cluttering
      # the Docker Hub tag listing with attestation manifests.
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/dochub:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: dochub-sbom.spdx.json
          upload-artifact: false

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            BEGIN { gsub(/\./, "\\.", v) }          # match dots literally
            $0 ~ "^## \\[" v "\\]" { f = 1; next }  # start at this version
            /^## / { f = 0 }                        # stop at the next section
            f' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf 'Release %s.\n' "$GITHUB_REF_NAME" > release-notes.md
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag \
            dochub-sbom.spdx.json
