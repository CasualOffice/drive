name: Release

# Publishes the Doc-Hub container image to Docker Hub on a version tag.
# Push a tag like `v0.0.1` (matching the workspace version in Cargo.toml) to
# trigger a multi-arch build + push, an SBOM, and a GitHub Release.
#
# Once the image is pushed the release is a success; the SBOM + GitHub-Release
# steps are best-effort and re-runnable so a post-push GitHub-API blip can't
# mask a published image. The Docker Hub overview is maintained separately by
# `hub-overview.yml`.
#
# Secrets live in the `release` GitHub environment:
#   DOCKERHUB_USERNAME  — Docker Hub namespace (the image is <username>/dochub)
#   DOCKERHUB_TOKEN     — Docker Hub access token with write scope

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the GitHub Release for the tag

jobs:
  image:
    name: build + push image
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      # Guard: the git tag must match the Cargo workspace version, so a
      # mistagged push can never publish an image whose binary reports a
      # different version.
      - name: Verify tag matches Cargo version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_ver="$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)"
          echo "git tag: $tag — Cargo version: $cargo_ver"
          if [ "$tag" != "$cargo_ver" ]; then
            echo "::error::tag v$tag does not match Cargo version $cargo_ver — bump one to match"
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/dochub
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=Doc-Hub
            org.opencontainers.image.description=Encrypted, tamper-evident self-hosted document hub
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.url=https://casualoffice.org
            org.opencontainers.image.source=https://github.com/CasualOffice/drive

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        env:
          # build-push-action@v6 uploads a "build record" to the GitHub API
          # *after* the image is pushed. During a GitHub REST-API incident that
          # upload returned 403 and failed the step even though the multi-arch
          # image had already published — masking a successful v0.0.1 release as
          # a red failure for hours. We don't consume the summary/record, so
          # disable both to drop that failure mode: a pushed image is a success.
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Keep the Docker Hub tag listing clean (no unknown/unknown
          # attestation entries). SBOM + provenance are a documented
          # fast-follow once the pipeline is proven.
          provenance: false

      # The Docker Hub overview (long description) is maintained by the
      # dedicated `hub-overview.yml` workflow — editing it goes through Docker
      # Hub's web API, which needs a *user* login (not the org+registry-PAT pair
      # used here) and so can't run from this job. Keeping it out of the release
      # path also means a Hub-description hiccup can never fail a release whose
      # image has already published.

      # Software bill of materials for the published image — attached to the
      # GitHub Release (not the registry) so it's discoverable without cluttering
      # the Docker Hub tag listing with attestation manifests. Non-blocking: a
      # pushed image is the release, so an SBOM hiccup must not fail it.
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        continue-on-error: true
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/dochub:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: dochub-sbom.spdx.json
          upload-artifact: false

      # Idempotent: create the Release, or update its notes if a prior (maybe
      # partially-failed) run already made it — so re-running a release that
      # died after the image push completes cleanly instead of erroring on
      # "release already exists". The SBOM is attached only if it was generated.
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            BEGIN { gsub(/\./, "\\.", v) }          # match dots literally
            $0 ~ "^## \\[" v "\\]" { f = 1; next }  # start at this version
            /^## / { f = 0 }                        # stop at the next section
            f' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf 'Release %s.\n' "$GITHUB_REF_NAME" > release-notes.md
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME exists — updating notes"
            gh release edit "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md \
              --verify-tag
          fi
          if [ -f dochub-sbom.spdx.json ]; then
            gh release upload "$GITHUB_REF_NAME" dochub-sbom.spdx.json --clobber
          fi
