# cargo-deny configuration — see https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# RUSTSEC-2023-0071 (RSA Marvin Attack) is reachable only via sqlx-mysql,
# which we do not enable. We never construct a MySQL pool.
#
# The 2026-06-29 advisories are transitive and suppressed until the dependency
# bump lands in the code revamp (tracked in ROADMAP Phase 0):
#   RUSTSEC-2026-0190 — anyhow soundness (Error::context + downcast_mut UB)
#   RUSTSEC-2026-0194 — quick-xml quadratic-time DoS (fix >= 0.41.0)
#   RUSTSEC-2026-0195 — quick-xml namespace-alloc DoS (fix >= 0.41.0)
#
# RUSTSEC-2026-0192 — `ttf-parser` unmaintained (NOT a vulnerability). Reachable
# only via `pdf-extract` (PDF text extraction in dochub-core::extract); it parses
# font tables to map glyphs → text. It's the de-facto pure-Rust TrueType parser
# (resvg et al.) with no maintained drop-in, no known vuln, and PDF bytes are
# already sniff-gated at ingest. Extraction runs behind std::panic::catch_unwind
# so a parser panic can't crash the worker. Revisit if a maintained fork lands.
ignore = [
    "RUSTSEC-2023-0071",
    "RUSTSEC-2026-0190",
    "RUSTSEC-2026-0192",
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "OpenSSL",
    # tiny-keccak (transitive via opendal → reqsign → rust-ini → ...) is CC0.
    # CC0 is a permissive public-domain dedication, OSI-recognized via review.
    "CC0-1.0",
    # webpki-roots is CDLA-Permissive-2.0 (Mozilla CA bundle). Pulled in via
    # reqwest → openidconnect. Permissive license, no copyleft.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
# The `radix-ui` umbrella crate re-exports its sub-packages via wildcard
# version specs — that's the upstream-recommended consumption pattern.
# Demote to warn so cargo deny gates on real wildcards from our own crates.
wildcards = "warn"
highlight = "all"
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
