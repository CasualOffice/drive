<svg viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Doc-Hub — revamp in progress</title>
  <desc>Monochrome rounded-square mark showing a stack of versioned documents, paired with the Doc-Hub wordmark and a work-in-progress tag.</desc>

  <defs>
    <clipPath id="dh-mark-clip">
      <rect x="0" y="0" width="172" height="172" rx="40"/>
    </clipPath>
  </defs>

  <!-- Mark: a stack of versioned documents (the registry) -->
  <g transform="translate(150 60)" clip-path="url(#dh-mark-clip)">
    <rect width="172" height="172" fill="#16161A"/>
    <!-- older versions, peeking behind -->
    <rect x="70" y="30" width="66" height="86" rx="10" fill="#45454B"/>
    <rect x="58" y="41" width="66" height="86" rx="10" fill="#8A8A92"/>
    <!-- current version -->
    <rect x="44" y="52" width="66" height="86" rx="10" fill="#F5F3EE"/>
    <g fill="#16161A">
      <rect x="56" y="72"  width="42" height="6" rx="3"/>
      <rect x="56" y="86"  width="42" height="6" rx="3"/>
      <rect x="56" y="100" width="28" height="6" rx="3"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="372" y="150" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="52" font-weight="500" letter-spacing="4" fill="#16161A">DOC-HUB</text>

  <!-- Work-in-progress tag -->
  <circle cx="378" cy="192" r="6" fill="#B7791F"/>
  <text x="394" y="199" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="20" font-weight="500" letter-spacing="4" fill="#8A8A92">WORK IN PROGRESS</text>
</svg>
