<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!--
      Theme bootstrap — MUST run before first paint. Without it, the page
      renders with the OS/system palette and then flips to the user's stored
      choice once React mounts ThemeToggle's effect (a jarring light↔dark
      flash on every load/navigation). This synchronous script sets
      `data-theme` up front, exactly matching ThemeToggle: explicit
      light/dark win; "system"/absent leave the attribute off so the
      `@media (prefers-color-scheme)` rules in tokens.css drive the palette.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) {
          /* private mode / storage disabled — fall through to system */
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!--
      Material Symbols Outlined — the icon font the embedded sheet editor's
      built-in chrome (@casualoffice/sheets, chrome="full") renders its
      toolbar / menu / formula-bar glyphs with. The SDK self-injects this
      link, but its font-dedup guard collapses both Google Fonts URLs to the
      shared `/css2` path, so only the FIRST link (Inter) is ever added and
      Material Symbols is skipped — the chrome icons then fall back to raw
      ligature text. Loading it here (the host owns its fonts, same as Inter /
      IBM Plex) guarantees the editor chrome icons render regardless. Track
      the SDK fix in @casualoffice/sheets `chrome/fonts.ts`.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200&display=block"
    />
    <title>Doc-Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
